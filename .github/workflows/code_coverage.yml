name: Code Coverage
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Keep this version string in sync with check_package.yml.
env:
  TEST_DATA_VERSION: test-data-v1.0.2

jobs:
  build:
    name: python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Cache test data
        id: cache-test-data
        uses: actions/cache@v4
        with:
          path: tests/data
          key: test-data-${{ env.TEST_DATA_VERSION }}

      - name: Download test data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p tests/data
          gh release download "$TEST_DATA_VERSION" \
            --repo "${{ github.repository }}" \
            --pattern 'test-data.zip' \
            --output /tmp/test-data.zip \
            --clobber
          unzip -q -o /tmp/test-data.zip -d tests/data
          rm /tmp/test-data.zip
          echo "Extracted $(find tests/data -type f | wc -l) test data files."

      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - name: Install the project
        run: uv sync --locked --all-extras --dev
      - name: Run code coverage
        run: uv run pytest --cov --cov-branch --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: AIQC-Hub/aiqclib